<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource}; script-src 'nonce-${nonce}';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="${styleUri}" />
    <title>AI Orchestrator</title>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>AI Orchestrator</h1>
          <p>Agent-style routing for parallel coding chats.</p>
        </div>
        <span id="task-count-pill" class="count-pill">0</span>
      </header>

      <section class="composer">
        <textarea id="prompt-input" rows="3" placeholder="Ask the orchestrator to start or route a task..."></textarea>
        <div class="prompt-actions">
          <span class="hint">Ctrl/Cmd Enter</span>
          <button id="clear-completed-button" class="ghost">Clear</button>
          <button id="submit-button">Send</button>
        </div>
      </section>

      <section class="batch">
        <div class="batch-header">
          <h2>Active</h2>
          <span id="active-count" class="batch-count">0</span>
        </div>
        <div id="active-tasks" class="task-list"></div>
      </section>

      <section class="batch">
        <div class="batch-header">
          <h2>Queued</h2>
          <span id="queued-count" class="batch-count">0</span>
        </div>
        <div id="queued-tasks" class="task-list"></div>
      </section>

      <section class="batch">
        <div class="batch-header">
          <h2>Completed</h2>
          <span id="completed-count" class="batch-count">0</span>
        </div>
        <div id="completed-tasks" class="task-list"></div>
      </section>

      <section class="batch">
        <div class="batch-header">
          <h2>Needs attention</h2>
          <span id="failed-count" class="batch-count">0</span>
        </div>
        <div id="failed-tasks" class="task-list"></div>
      </section>

      <section class="locks-drawer">
        <div class="batch-header">
          <h2>File locks</h2>
          <span id="lock-count" class="batch-count">0</span>
        </div>
        <div id="locks" class="lock-list"></div>
      </section>
    </main>

    <script nonce="${nonce}" src="${scriptUri}"></script>
  </body>
</html>
